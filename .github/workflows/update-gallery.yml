name: Update Gallery

on:
  push:
    branches: [main]
    paths:
      # Trigger only when actual image files change — not when the script
      # updates manifest.json or lightbox.js (prevents infinite loop).
      - 'images/lightbox/*.jpg'
      - 'images/lightbox/*.jpeg'
      - 'images/lightbox/*.png'
      - 'images/lightbox/*.gif'
      - 'images/lightbox/*.webp'
      - 'images/lightbox/*.avif'
      - 'images/lightbox/*.JPG'
      - 'images/lightbox/*.JPEG'
      - 'images/lightbox/*.PNG'
      # Also trigger when captions are edited directly in the manifest.
      # GitHub won't re-trigger this workflow from the bot's own commits,
      # so there is no infinite loop risk.
      - 'images/lightbox/manifest.json'

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the manifest/JS update back

    steps:
      - uses: actions/checkout@v4

      - name: Sync manifest and lightbox.js
        run: node .github/scripts/update-gallery.js

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/lightbox/manifest.json js/lightbox.js
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: auto-update gallery manifest [skip ci]"
          git push
