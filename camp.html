// ── Persistent checklist hook (localStorage) ──────────────────────────────────

function useChecklist(key) {
  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem("camp_" + key) || "{}"); }
    catch { return {}; }
  });

  const toggle = (id) => {
    setChecked(prev => {
      const next = { ...prev, [id]: !prev[id] };
      try { localStorage.setItem("camp_" + key, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const clearAll = () => {
    setChecked({});
    try { localStorage.removeItem("camp_" + key); } catch {}
  };

  return { checked, toggle, clearAll };
}

// ── Shared components ─────────────────────────────────────────────────────────

function ProgressBar({ done, total }) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  return (
    <div style={{ padding: "10px 12px 0", display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ flex: 1, height: 4, background: T.cardBorder, borderRadius: 2, overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", background: T.green, borderRadius: 2, transition: "width 0.3s" }} />
      </div>
      <span style={{ fontSize: 12, color: T.muted, flexShrink: 0 }}>{done}/{total}</span>
    </div>
  );
}

function Card({ children, headerText, headerColor, badge }) {
  return (
    <div style={{ background: T.card, border: `1px solid ${T.cardBorder}`, borderRadius: 8, margin: "10px 12px 0", overflow: "hidden" }}>
      <div style={{ background: headerColor || T.accentDim, padding: "9px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 12, fontWeight: "bold", color: "#fff", textTransform: "uppercase", letterSpacing: "0.08em" }}>{headerText}</span>
        {badge !== undefined && <span style={{ fontSize: 11, background: "rgba(0,0,0,0.3)", color: "#fff", padding: "2px 8px", borderRadius: 10 }}>{badge}</span>}
      </div>
      {children}
    </div>
  );
}

function CheckRow({ label, sublabel, rightLabel, checked, onToggle }) {
  return (
    <div onClick={onToggle}
      style={{ display: "flex", alignItems: "center", padding: "12px 14px", borderBottom: `1px solid ${T.divider}`,
        background: checked ? "rgba(74,140,92,0.07)" : "transparent", cursor: "pointer", userSelect: "none" }}>
      <div style={{ width: 24, height: 24, borderRadius: 5, border: `2px solid ${checked ? T.green : T.muted}`,
        background: checked ? T.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, marginRight: 12, transition: "all 0.15s" }}>
        {checked && <span style={{ color: "#fff", fontSize: 14, fontWeight: "bold", lineHeight: 1 }}>✓</span>}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, color: checked ? T.muted : T.text, textDecoration: checked ? "line-through" : "none", lineHeight: 1.3 }}>{label}</div>
        {sublabel && <div style={{ fontSize: 11, color: T.muted, marginTop: 3 }}>{sublabel}</div>}
      </div>
      {rightLabel && <span style={{ fontSize: 12, color: T.accent, fontWeight: "bold", marginLeft: 10, flexShrink: 0, fontStyle: "italic" }}>{rightLabel}</span>}
    </div>
  );
}

function ClearBtn({ onClear }) {
  return (
    <button onClick={onClear}
      style={{ fontSize: 11, color: T.muted, background: "none", border: `1px solid ${T.cardBorder}`,
        borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontFamily: "Georgia, serif" }}>
      Clear all
    </button>
  );
}

// ── Tab views ─────────────────────────────────────────────────────────────────

function ShoppingTab() {
  const { checked, toggle, clearAll } = useChecklist("shopping");
  const allKeys = SHOPPING.flatMap((c, ci) => c.items.map((_, ii) => `${ci}-${ii}`));
  const done = allKeys.filter(k => checked[k]).length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 12px 0" }}>
        <span style={{ fontSize: 13, color: T.muted }}>Tap items to check off</span>
        <ClearBtn onClear={clearAll} />
      </div>
      <ProgressBar done={done} total={allKeys.length} />
      {SHOPPING.map((cat, ci) => {
        const catDone = cat.items.filter((_, ii) => checked[`${ci}-${ii}`]).length;
        return (
          <Card key={ci} headerText={cat.category} badge={`${catDone}/${cat.items.length}`}>
            {cat.items.map((row, ii) => (
              <CheckRow key={ii} label={row.item} rightLabel={row.qty || null}
                checked={!!checked[`${ci}-${ii}`]} onToggle={() => toggle(`${ci}-${ii}`)} />
            ))}
          </Card>
        );
      })}
      <div style={{ height: 20 }} />
    </div>
  );
}

              color: tab === t.id ? T.accent : T.muted, background: "none", border: "none",
              borderBottom: tab === t.id ? `2px solid ${T.accent}` : "2px solid transparent",
              cursor: "pointer", whiteSpace: "nowrap", fontFamily: "Georgia, serif" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ maxWidth: 600, margin: "0 auto" }}>
        {tab === "shopping" && <ShoppingTab />}
        {tab === "gear"     && <GearTab />}
        {tab === "menu"     && <MenuTab />}
        {tab === "rsvp"     && <RsvpTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
